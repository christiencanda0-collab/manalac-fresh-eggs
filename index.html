<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manalac's Fresh Eggs | Premium Ordering</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff9f43;
            --secondary-color: #ee5253;
            --glass-bg: rgba(255, 255, 255, 0.92);
            --accent-gradient: linear-gradient(135deg, #ff9f43 0%, #ff6b6b 100%);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: url('https://images.unsplash.com/photo-1582722872445-44dc5f7e3c8f?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80') no-repeat center center fixed;
            background-size: cover;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #2d3436;
            padding: 20px;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 35px 25px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-circle {
            width: 70px;
            height: 70px;
            background: var(--accent-gradient);
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 35px;
            color: white;
            margin-bottom: 15px;
            box-shadow: 0 10px 20px rgba(255, 159, 67, 0.3);
        }

        h1 {
            font-weight: 700;
            font-size: 24px;
            margin: 0;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 13px;
            color: #636e72;
            margin-bottom: 25px;
        }

        /* Price Table Styling */
        .price-section {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 25px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .price-section h3 {
            font-size: 14px;
            margin-top: 0;
            margin-bottom: 10px;
            color: #ff6b6b;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .price-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .price-table th {
            padding: 8px;
            border-bottom: 2px solid #fab1a0;
            color: #2d3436;
        }

        .price-table td {
            padding: 10px 8px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .size-label { font-weight: 600; color: #2d3436; }
        .price-val { color: #10ac84; font-weight: 700; }

        .price-note {
            font-size: 9px;
            color: #b2bec3;
            margin-top: 10px;
            font-style: italic;
        }

        /* Order Button */
        .order-btn {
            display: block;
            background: var(--accent-gradient);
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 15px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.3);
            text-transform: uppercase;
        }

        .order-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(255, 107, 107, 0.4);
        }

        .footer-text {
            margin-top: 20px;
            font-size: 10px;
            color: #95a5a6;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-circle">🥚</div>
        <h1>Manalac's Fresh Eggs</h1>
        <div class="tagline">Premium Farm-to-Table Experience</div>

        <div class="price-section">
            <h3>Current Price List</h3>
            <table class="price-table">
                <thead>
                    <tr>
                        <th>Size</th>
                        <th>Tray (30s)</th>
                        <th>Case (360s)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="size-label">XS</td>
                        <td class="price-val">₱180</td>
                        <td class="price-val">₱2,100</td>
                    </tr>
                    <tr>
                        <td class="size-label">Small</td>
                        <td class="price-val">₱195</td>
                        <td class="price-val">₱2,300</td>
                    </tr>
                    <tr>
                        <td class="size-label">Medium</td>
                        <td class="price-val">₱210</td>
                        <td class="price-val">₱2,500</td>
                    </tr>
                </tbody>
            </table>
            <div class="price-note">*Prices are subject to change based on market rates.</div>
        </div>

        <a href="https://docs.google.com/forms/d/e/1FAIpQLSf1HXAREce_g4_2t_I2RuC8xdGfetzTKtOcgyD7-BM1blKXVA/viewform?usp=header" class="order-btn">
            Place Order Now
        </a>

        <div class="footer-text">
            SECURE CLOUD ORDERING SYSTEM
        </div>
    </div>

</body>
</html>
